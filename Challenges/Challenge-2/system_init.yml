---
- name: Initialize Systems
  hosts: linux
  remote_user: REDACTED

  tasks:
  - name: Update the apt cache
    ansible.builtin.apt:
      update_cache: yes
    become: yes

  - name: Update all packages
    ansible.builtin.apt:
      name: "*"
      state: latest

  - name: Install CURL
    ansible.builtin.apt:
      name: curl
      state: present

  - name: Install GIT
    ansible.builtin.apt:
      name: git
      state: present

  - name: Install VIM
    ansible.builtin.apt:
      name: vim
      state: present

  - name: Add a user with a specific shell
    ansible.builtin.user:
      name: devops
      shell: /bin/bash
